<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --surface: #EDEAE3;
      --border: #D4CFC6;
      --text: #1A1917;
      --muted: #7A766E;
      --accent: #2D6A4F;
      --accent-dim: #2D6A4F22;
      --danger: #B85C38;
      --warn: #B07D2A;
      --warn-bg: #FFF3CD44;
      --danger-bg: #FDECEA44;
      --radius: 4px;
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'Lora', serif;
    }

    [data-theme="dark"] {
      --bg: #141412;
      --surface: #1E1D1A;
      --border: #2E2D29;
      --text: #E8E4DC;
      --muted: #7A766E;
      --accent: #52B788;
      --accent-dim: #52B78822;
      --danger: #E07A5F;
      --warn: #D4A842;
      --warn-bg: #FFF3CD18;
      --danger-bg: #FDECEA18;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    .app { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav { display: flex; gap: 8px; align-items: center; }

    .nav-btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-btn:hover { color: var(--text); border-color: var(--text); }
    .nav-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      padding: 4px 8px;
      border-radius: var(--radius);
      transition: color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); }

    .view { display: none; }
    .view.active { display: block; }

    /* ── Journal ── */
    .journal-header { margin-bottom: 28px; }
    .date-label { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
    .timer-row { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }

    .timer-display {
      font-family: var(--mono);
      font-size: 42px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
      min-width: 120px;
    }
    .timer-display.running { color: var(--accent); }
    .timer-display.done { color: var(--danger); }

    .timer-controls { display: flex; gap: 8px; align-items: center; }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--text); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { border-color: transparent; color: var(--muted); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border); }

    select.duration-select {
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .writing-area {
      width: 100%;
      min-height: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .writing-area:focus { border-color: var(--accent); }
    .writing-area::placeholder { color: var(--muted); font-style: italic; }

    .writing-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }
    .word-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* ── Section header ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Projects tab ── */
    .project-headers {
      display: grid;
      grid-template-columns: 1fr 130px 160px auto;
      gap: 16px;
      padding: 0 16px 8px;
    }
    .col-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .project-list { display: flex; flex-direction: column; gap: 2px; }

    .project-row {
      display: grid;
      grid-template-columns: 1fr 130px 160px auto;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: var(--radius);
      transition: border-color 0.15s;
    }
    .project-row:hover { border-color: var(--border); }
    .project-row.warn { border-left: 3px solid var(--warn); background: var(--warn-bg); }
    .project-row.overdue { border-left: 3px solid var(--danger); background: var(--danger-bg); }

    .project-title {
      font-family: var(--serif);
      font-size: 16px;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      outline: none;
      width: 100%;
      font-weight: 500;
      transition: border-color 0.15s;
    }
    .project-title:focus { border-bottom-color: var(--accent); }

    .project-field {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .project-field:focus { border-bottom-color: var(--accent); color: var(--text); }

    .deadline-badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 10px;
      display: inline-block;
      margin-left: 6px;
      vertical-align: middle;
    }
    .deadline-badge.warn { background: var(--warn); color: #fff; }
    .deadline-badge.overdue { background: var(--danger); color: #fff; }

    .project-actions { display: flex; gap: 6px; align-items: center; }

    .link-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .link-btn:hover { color: var(--accent); border-color: var(--accent); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: var(--radius);
      transition: color 0.15s;
    }
    .delete-btn:hover { color: var(--danger); }

    /* ── Calendar tab ── */
    .calendar-page {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 28px;
      align-items: start;
    }

    .calendar-embed {
      width: 100%;
      height: 560px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: block;
    }

    /* ── Tasks ── */
    .tasks-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: sticky;
      top: 20px;
    }

    .tasks-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .task-input-row { display: flex; gap: 6px; margin-bottom: 16px; }

    .task-input {
      flex: 1;
      font-family: var(--serif);
      font-size: 14px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: var(--radius);
      outline: none;
    }
    .task-input:focus { border-color: var(--accent); }

    .task-add {
      font-family: var(--mono);
      font-size: 18px;
      line-height: 1;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }
    .task-add:hover { background: var(--accent-dim); }

    .task-sections { display: flex; flex-direction: column; gap: 16px; }

    .task-group-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .task-items { display: flex; flex-direction: column; gap: 2px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 4px;
      border-radius: var(--radius);
    }
    .task-item input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
      margin-top: 3px;
    }
    .task-item label {
      font-family: var(--serif);
      font-size: 14px;
      color: var(--text);
      flex: 1;
      cursor: pointer;
      line-height: 1.4;
    }
    .task-item.done label { text-decoration: line-through; color: var(--muted); }

    .task-del {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .task-del:hover { color: var(--danger); }

    .clear-done {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 0 0;
      transition: color 0.15s;
    }
    .clear-done:hover { color: var(--danger); }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-table td {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-table td.muted { color: var(--muted); }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #fff;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      padding: 10px 24px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .calendar-page { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .project-row { grid-template-columns: 1fr auto; }
      .project-field { display: none; }
      .project-headers { display: none; }
    }
  </style>
</head>
<body data-theme="light">
<div class="app">

  <div class="topbar">
    <span class="wordmark">Studio</span>
    <div class="nav">
      <button class="nav-btn active" onclick="showView('journal', this)">Write</button>
      <button class="nav-btn" onclick="showView('projects', this)">Projects</button>
      <button class="nav-btn" onclick="showView('calendar', this)">Calendar</button>
      <button class="nav-btn" onclick="showView('stats', this)">Log</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">◐</button>
    </div>
  </div>

  <!-- ── Write ── -->
  <div id="view-journal" class="view active">
    <div class="journal-header">
      <span class="date-label" id="today-date"></span>
    </div>
    <div class="timer-row">
      <div class="timer-display" id="timer-display">20:00</div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="play-btn" onclick="toggleTimer()">Play</button>
        <button class="btn btn-ghost" onclick="resetTimer()">Reset</button>
        <select class="duration-select" id="duration-select" onchange="setDuration(this.value)">
          <option value="15">15 min</option>
          <option value="20" selected>20 min</option>
          <option value="25">25 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
        </select>
      </div>
    </div>
    <textarea class="writing-area" id="writing-area" placeholder="Begin when you're ready." oninput="updateWordCount()"></textarea>
    <div class="writing-footer">
      <span class="word-count" id="word-count">0 words</span>
      <button class="btn btn-primary" onclick="saveEntry()">Save entry</button>
    </div>
  </div>

  <!-- ── Projects ── -->
  <div id="view-projects" class="view">
    <div class="section-header">
      <span class="section-title">Projects</span>
      <button class="btn btn-primary" onclick="addProject()">+ Add</button>
    </div>
    <div class="project-headers">
      <span class="col-label">Title</span>
      <span class="col-label">Deadline</span>
      <span class="col-label">Contact</span>
      <span class="col-label"></span>
    </div>
    <div class="project-list" id="project-list"></div>
  </div>

  <!-- ── Calendar ── -->
  <div id="view-calendar" class="view">
    <div class="calendar-page">
      <div>
        <div class="section-header">
          <span class="section-title">Calendar</span>
        </div>
        <iframe
          class="calendar-embed"
          src="https://calendar.google.com/calendar/embed?src=renpowell.writer%40gmail.com&ctz=Europe%2FOslo&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=0&mode=WEEK"
          frameborder="0"
          scrolling="no"
        ></iframe>
      </div>

      <div class="tasks-panel">
        <div class="tasks-title">Tasks</div>
        <div class="task-input-row">
          <input class="task-input" id="task-input" type="text" placeholder="Add a task..." onkeydown="taskKeydown(event)" />
          <button class="task-add" onclick="addTask()">+</button>
        </div>
        <div class="task-sections">
          <div id="tasks-active-wrap">
            <div class="task-group-label">To do</div>
            <div class="task-items" id="tasks-active"></div>
          </div>
          <div id="tasks-done-wrap" style="display:none">
            <div class="task-group-label">Done</div>
            <div class="task-items" id="tasks-done"></div>
            <button class="clear-done" onclick="clearDone()">Clear done</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Log ── -->
  <div id="view-stats" class="view">
    <div class="section-header">
      <span class="section-title">Writing log</span>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <table class="log-table">
      <thead>
        <tr>
          <th>Date</th><th>Words</th><th>Time</th><th>Type</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  var timerInterval = null;
  var timerRunning = false;
  var timerDuration = 20 * 60;
  var timerRemaining = 20 * 60;
  var sessionStartTime = null;

  var STORAGE_KEY = 'studio_v1';

  function loadData() {
    try {
      var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!d) d = {};
      if (!d.projects) d.projects = [];
      if (!d.log) d.log = [];
      if (!d.tasks) d.tasks = [];
      return d;
    } catch(e) { return { projects: [], log: [], tasks: [] }; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function toggleTheme() {
    var body = document.body;
    body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('studio_theme', body.dataset.theme);
  }

  function showView(name, btn) {
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('view-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'projects') renderProjects();
    if (name === 'calendar') renderTasks();
    if (name === 'stats') renderStats();
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function displayTimer(secs) {
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    document.getElementById('timer-display').textContent = pad(m) + ':' + pad(s);
  }

  function setDuration(mins) {
    timerDuration = parseInt(mins) * 60;
    timerRemaining = timerDuration;
    displayTimer(timerRemaining);
    if (timerRunning) stopTimer();
    document.getElementById('timer-display').className = 'timer-display';
  }

  function toggleTimer() {
    timerRunning ? stopTimer() : startTimer();
  }

  function startTimer() {
    if (timerRemaining <= 0) timerRemaining = timerDuration;
    timerRunning = true;
    sessionStartTime = sessionStartTime || Date.now();
    document.getElementById('play-btn').textContent = 'Pause';
    document.getElementById('timer-display').classList.add('running');
    timerInterval = setInterval(function() {
      timerRemaining--;
      displayTimer(timerRemaining);
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('play-btn').textContent = 'Play';
        document.getElementById('timer-display').className = 'timer-display done';
        showToast('Time is up');
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('play-btn').textContent = 'Play';
    document.getElementById('timer-display').classList.remove('running');
  }

  function resetTimer() {
    stopTimer();
    timerRemaining = timerDuration;
    sessionStartTime = null;
    displayTimer(timerRemaining);
    document.getElementById('timer-display').className = 'timer-display';
  }

  function countWords(text) {
    return text.trim() ? text.trim().split(/\s+/).length : 0;
  }

  function updateWordCount() {
    var n = countWords(document.getElementById('writing-area').value);
    document.getElementById('word-count').textContent = n + (n === 1 ? ' word' : ' words');
  }

  function saveEntry() {
    var text = document.getElementById('writing-area').value.trim();
    if (!text) { showToast('Nothing to save yet'); return; }
    var words = countWords(text);
    var now = new Date();
    var elapsed = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 60000) : null;
    var data = loadData();
    data.log.push({ date: now.toISOString(), words: words, minutes: elapsed, type: 'journal', text: text });
    saveData(data);
    var filename = 'journal-' + now.toISOString().slice(0, 10) + '.txt';
    var blob = new Blob([text], { type: 'text/plain' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    document.getElementById('writing-area').value = '';
    updateWordCount();
    resetTimer();
    showToast('Saved ' + words + ' words');
  }

  // ── Deadline helpers ──
  function deadlineStatus(dateStr) {
    if (!dateStr) return null;
    var parts = dateStr.split(/[.\-\/]/);
    var d;
    if (parts.length === 3) {
      // try dd.mm.yyyy or yyyy-mm-dd
      if (parts[0].length === 4) {
        d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      } else {
        d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
      }
    } else {
      d = new Date(dateStr);
    }
    if (isNaN(d)) return null;
    var now = new Date();
    now.setHours(0,0,0,0);
    d.setHours(0,0,0,0);
    var diff = Math.round((d - now) / 86400000);
    if (diff < 0) return 'overdue';
    if (diff <= 7) return 'warn';
    return null;
  }

  function deadlineLabel(status) {
    if (status === 'overdue') return '<span class="deadline-badge overdue">overdue</span>';
    if (status === 'warn') return '<span class="deadline-badge warn">soon</span>';
    return '';
  }

  // ── Projects ──
  function renderProjects() {
    var data = loadData();
    var list = document.getElementById('project-list');
    if (!data.projects.length) {
      list.innerHTML = '<div class="empty">No projects yet.</div>';
      return;
    }
    list.innerHTML = data.projects.map(function(p, i) {
      var status = deadlineStatus(p.deadline);
      var rowClass = 'project-row' + (status ? ' ' + status : '');
      var driveBtn = p.driveUrl
        ? '<a class="link-btn" href="' + esc(p.driveUrl) + '" target="_blank">Drive ↗</a>'
        : '<button class="link-btn" onclick="setDriveLink(' + i + ')">+ Drive</button>';
      return '<div class="' + rowClass + '">'
        + '<div style="display:flex;align-items:center;gap:4px;">'
        + '<input class="project-title" value="' + esc(p.title) + '" placeholder="Project title" onchange="updateProject(' + i + ', \'title\', this.value)" />'
        + deadlineLabel(status)
        + '</div>'
        + '<input class="project-field" value="' + esc(p.deadline) + '" placeholder="dd.mm.yyyy" onchange="updateProject(' + i + ', \'deadline\', this.value); renderProjects();" />'
        + '<input class="project-field" value="' + esc(p.contact) + '" placeholder="Contact" onchange="updateProject(' + i + ', \'contact\', this.value)" />'
        + '<div class="project-actions">' + driveBtn
        + '<button class="delete-btn" onclick="deleteProject(' + i + ')" title="Delete">×</button>'
        + '</div></div>';
    }).join('');
  }

  function addProject() {
    var data = loadData();
    data.projects.push({ title: '', deadline: '', contact: '', driveUrl: '' });
    saveData(data);
    renderProjects();
    var rows = document.querySelectorAll('.project-row');
    if (rows.length) rows[rows.length - 1].querySelector('.project-title').focus();
  }

  function updateProject(i, field, value) {
    var data = loadData();
    data.projects[i][field] = value;
    saveData(data);
  }

  function deleteProject(i) {
    if (!confirm('Remove this project?')) return;
    var data = loadData();
    data.projects.splice(i, 1);
    saveData(data);
    renderProjects();
  }

  function setDriveLink(i) {
    var url = prompt('Paste Google Drive folder URL:');
    if (!url) return;
    updateProject(i, 'driveUrl', url);
    renderProjects();
  }

  // ── Tasks ──
  function taskKeydown(e) {
    if (e.key === 'Enter') addTask();
  }

  function addTask() {
    var input = document.getElementById('task-input');
    var text = input.value.trim();
    if (!text) return;
    var data = loadData();
    data.tasks.push({ text: text, done: false });
    saveData(data);
    input.value = '';
    renderTasks();
  }

  function toggleTask(i) {
    var data = loadData();
    data.tasks[i].done = !data.tasks[i].done;
    saveData(data);
    renderTasks();
  }

  function deleteTask(i) {
    var data = loadData();
    data.tasks.splice(i, 1);
    saveData(data);
    renderTasks();
  }

  function clearDone() {
    var data = loadData();
    data.tasks = data.tasks.filter(function(t) { return !t.done; });
    saveData(data);
    renderTasks();
  }

  function renderTasks() {
    var data = loadData();
    var tasks = data.tasks || [];
    var active = tasks.filter(function(t) { return !t.done; });
    var done = tasks.filter(function(t, i) { t._origIndex = i; return t.done; });

    var activeHtml = active.length ? tasks.map(function(t, i) {
      if (t.done) return '';
      return '<div class="task-item">'
        + '<input type="checkbox" id="tsk-' + i + '" onchange="toggleTask(' + i + ')" />'
        + '<label for="tsk-' + i + '">' + esc(t.text) + '</label>'
        + '<button class="task-del" onclick="deleteTask(' + i + ')">×</button>'
        + '</div>';
    }).join('') : '<div style="font-family:var(--mono);font-size:12px;color:var(--muted);padding:8px 4px;">All clear</div>';

    document.getElementById('tasks-active').innerHTML = activeHtml;

    var doneItems = tasks.map(function(t, i) {
      if (!t.done) return '';
      return '<div class="task-item done">'
        + '<input type="checkbox" id="tsk-' + i + '" checked onchange="toggleTask(' + i + ')" />'
        + '<label for="tsk-' + i + '">' + esc(t.text) + '</label>'
        + '<button class="task-del" onclick="deleteTask(' + i + ')">×</button>'
        + '</div>';
    }).join('');

    var doneWrap = document.getElementById('tasks-done-wrap');
    if (done.length) {
      document.getElementById('tasks-done').innerHTML = doneItems;
      doneWrap.style.display = '';
    } else {
      doneWrap.style.display = 'none';
    }
  }

  // ── Stats ──
  function renderStats() {
    var data = loadData();
    var log = data.log;
    if (!log.length) {
      document.getElementById('stats-grid').innerHTML = '';
      document.getElementById('log-body').innerHTML =
        '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:13px;">No entries yet.</td></tr>';
      return;
    }
    var now = new Date();
    var thisMonth = log.filter(function(e) {
      var d = new Date(e.date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    var totalWords = log.reduce(function(s, e) { return s + e.words; }, 0);
    var monthWords = thisMonth.reduce(function(s, e) { return s + e.words; }, 0);
    var totalMins = log.filter(function(e) { return e.minutes; }).reduce(function(s, e) { return s + e.minutes; }, 0);

    document.getElementById('stats-grid').innerHTML =
      '<div class="stat-card"><div class="stat-value">' + monthWords.toLocaleString() + '</div><div class="stat-label">Words this month</div></div>'
      + '<div class="stat-card"><div class="stat-value">' + totalWords.toLocaleString() + '</div><div class="stat-label">Words total</div></div>'
      + '<div class="stat-card"><div class="stat-value">' + log.length + '</div><div class="stat-label">Sessions</div></div>'
      + '<div class="stat-card"><div class="stat-value">' + totalMins + '</div><div class="stat-label">Minutes written</div></div>';

    var sorted = log.slice().sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
    document.getElementById('log-body').innerHTML = sorted.map(function(e) {
      return '<tr>'
        + '<td>' + new Date(e.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + '</td>'
        + '<td>' + e.words + '</td>'
        + '<td class="muted">' + (e.minutes ? e.minutes + ' min' : '-') + '</td>'
        + '<td class="muted">' + e.type + '</td>'
        + '</tr>';
    }).join('');
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function esc(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Init ──
  document.getElementById('today-date').textContent = formatDate(new Date());
  displayTimer(timerRemaining);
  var savedTheme = localStorage.getItem('studio_theme');
  if (savedTheme) document.body.dataset.theme = savedTheme;
</script>
</body>
</html>
