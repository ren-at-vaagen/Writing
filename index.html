<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F5F0; --surface: #EDEAE3; --border: #D4CFC6;
      --text: #1A1917; --muted: #7A766E; --accent: #2D6A4F;
      --accent-dim: #2D6A4F22; --danger: #B85C38; --warn: #B07D2A;
      --warn-bg: #FFF3CD44; --danger-bg: #FDECEA44;
      --radius: 4px; --mono: 'IBM Plex Mono', monospace; --serif: 'Lora', serif;
    }
    [data-theme="dark"] {
      --bg: #141412; --surface: #1E1D1A; --border: #2E2D29;
      --text: #E8E4DC; --muted: #7A766E; --accent: #52B788;
      --accent-dim: #52B78822; --danger: #E07A5F; --warn: #D4A842;
      --warn-bg: #FFF3CD18; --danger-bg: #FDECEA18;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--serif); font-size: 17px; line-height: 1.6; transition: background 0.3s, color 0.3s; min-height: 100vh; }
    .app { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    .wordmark { font-family: var(--mono); font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .nav { display: flex; gap: 8px; align-items: center; }
    .nav-btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border: 1px solid var(--border); background: transparent; color: var(--muted); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; }
    .nav-btn:hover { color: var(--text); border-color: var(--text); }
    .nav-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
    .theme-toggle { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px 8px; border-radius: var(--radius); transition: color 0.15s; }
    .theme-toggle:hover { color: var(--text); }
    .view { display: none; }
    .view.active { display: block; }

    /* Loading bar */
    .loading-bar { height: 2px; background: var(--accent); position: fixed; top: 0; left: 0; width: 0; transition: width 0.3s; z-index: 200; }
    .loading-bar.active { width: 70%; }
    .loading-bar.done { width: 100%; opacity: 0; transition: width 0.2s, opacity 0.4s 0.2s; }

    /* Write */
    .write-top { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; }
    .date-label { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
    .timer-inline { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .timer-display { font-family: var(--mono); font-size: 14px; font-weight: 400; color: var(--muted); min-width: 42px; }
    .timer-display.running { color: var(--accent); }
    .timer-display.done { color: var(--danger); }
    .timer-controls { display: flex; gap: 6px; align-items: center; }
    .btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 18px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); transition: all 0.15s; }
    .btn:hover { border-color: var(--text); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-sm { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; padding: 5px 10px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; }
    .btn-sm:hover { color: var(--text); border-color: var(--text); }
    .btn-sm.active-play { color: var(--accent); border-color: var(--accent); }
    .btn-ghost { border-color: transparent; color: var(--muted); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border); }
    select.duration-select { font-family: var(--mono); font-size: 11px; padding: 5px 8px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); border-radius: var(--radius); cursor: pointer; }
    .writing-area { width: 100%; min-height: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; font-family: var(--serif); font-size: 17px; line-height: 1.7; color: var(--text); resize: vertical; outline: none; transition: border-color 0.15s; }
    .writing-area:focus { border-color: var(--accent); }
    .writing-area:empty:before { content: attr(data-placeholder); color: var(--muted); font-style: italic; }
    .writing-area mark { background: var(--accent-dim); color: var(--text); padding: 1px 2px; border-radius: 2px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
    .writing-area.time-up { animation: pulse-glow 2.5s ease-in-out infinite; }
    #yesterday-area { cursor: text; opacity: 0.92; }
    @keyframes pulse-glow { 0%,100%{border-color:var(--border);box-shadow:none;} 50%{border-color:var(--danger);box-shadow:0 0 20px 3px var(--danger-bg);} }
    .writing-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .word-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* Section */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-title { font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* Projects — fixed alignment: header padding-left matches row padding-left + border-left */
    .project-headers { display: grid; grid-template-columns: 20px 1fr 120px 160px; gap: 12px; padding: 0 16px 8px 16px; border-left: 3px solid transparent; }
    .col-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .project-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
    .project-row { display: grid; grid-template-columns: 20px 1fr 120px 160px; gap: 12px; align-items: center; padding: 14px 16px; background: var(--surface); border: 1px solid transparent; border-left: 3px solid transparent; border-radius: var(--radius); transition: all 0.15s; }
    .project-row:hover { border-color: var(--border); }
    .project-row.warn { border-left: 3px solid var(--warn); background: var(--warn-bg); }
    .project-row.overdue { border-left: 3px solid var(--danger); background: var(--danger-bg); }
    .project-row.drag-over { border-color: var(--accent); background: var(--accent-dim); }
    .project-row.dragging { opacity: 0.4; }
    .drag-handle { color: var(--border); cursor: grab; font-size: 14px; user-select: none; }
    .drag-handle:hover { color: var(--muted); }
    .drag-handle:active { cursor: grabbing; } font-size: 16px; color: var(--text); background: transparent; border: none; border-bottom: 1px solid transparent; outline: none; flex: 1; min-width: 0; font-weight: 500; transition: border-color 0.15s; }
    .project-title:focus { border-bottom-color: var(--accent); }
    .project-field { font-family: var(--mono); font-size: 12px; color: var(--muted); background: transparent; border: none; border-bottom: 1px solid transparent; outline: none; width: 100%; transition: border-color 0.15s; }
    .project-field:focus { border-bottom-color: var(--accent); color: var(--text); }
    .deadline-badge { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 10px; display: inline-block; margin-left: 6px; vertical-align: middle; white-space: nowrap; }
    .deadline-badge.warn { background: var(--warn); color: #fff; }
    .deadline-badge.overdue { background: var(--danger); color: #fff; }
    .project-actions { display: flex; gap: 6px; align-items: center; }
    .link-btn { font-family: var(--mono); font-size: 11px; padding: 5px 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); border-radius: var(--radius); cursor: pointer; text-decoration: none; transition: all 0.15s; white-space: nowrap; }
    .link-btn:hover { color: var(--accent); border-color: var(--accent); }
    .delete-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: var(--radius); transition: color 0.15s; }
    .delete-btn:hover { color: var(--danger); }

    /* Planning sub-items */
    .plan-items { display: flex; flex-direction: column; gap: 2px; margin: 2px 0 4px 19px; }
    .plan-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); }
    .plan-item-text { font-family: var(--serif); font-size: 14px; color: var(--text); background: transparent; border: none; border-bottom: 1px solid transparent; outline: none; flex: 1; min-width: 0; transition: border-color 0.15s; }
    .plan-item-text:focus { border-bottom-color: var(--accent); }
    .plan-add-row { margin: 4px 0 12px 19px; }
    .plan-add-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 0; transition: color 0.15s; }
    .plan-add-btn:hover { color: var(--accent); }

    /* Calendar */
    .cal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .cal-nav { display: flex; gap: 4px; }
    .cal-title { font-family: var(--mono); font-size: 14px; color: var(--text); min-width: 180px; text-align: center; }
    .cal-view-toggle { display: flex; margin-left: auto; }
    .cal-view-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .cal-view-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .cal-view-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; border-left: none; }
    .cal-view-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .cal-grid-wrap { display: flex; gap: 24px; align-items: start; }
    .cal-main { flex: 1; min-width: 0; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .cal-weekday { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-align: center; padding: 4px 0; }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-day { min-height: 72px; padding: 6px; background: var(--surface); border: 1px solid transparent; border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s; }
    .cal-day:hover { border-color: var(--accent); }
    .cal-day.other-month { opacity: 0.35; }
    .cal-day.today { border-color: var(--accent); }
    .cal-day-num { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; }
    .cal-day.today .cal-day-num { color: var(--accent); font-weight: 500; }
    .cal-week-header { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .cal-week-col-head { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-align: center; padding: 4px 0; cursor: pointer; transition: color 0.15s; }
    .cal-week-col-head:hover { color: var(--accent); }
    .cal-week-col-head.today-col { color: var(--accent); }
    .cal-week-cells { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-week-cell { min-height: 100px; padding: 6px; background: var(--surface); border: 1px solid transparent; border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s; }
    .cal-week-cell:hover { border-color: var(--accent); }
    .cal-week-cell.today-col { background: var(--accent-dim); }
    .cal-event { font-family: var(--mono); font-size: 10px; padding: 2px 5px; border-radius: 2px; margin-bottom: 2px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-event.note { background: var(--accent-dim); color: var(--accent); }
    .cal-event.deadline { background: var(--danger-bg); color: var(--danger); }
    .cal-event.deadline.warn { background: var(--warn-bg); color: var(--warn); }

    /* Tasks panel */
    .tasks-panel { width: 220px; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: sticky; top: 20px; max-height: 70vh; overflow-y: auto; }
    .tasks-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .task-input-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .task-input { flex: 1; font-family: var(--serif); font-size: 14px; padding: 6px 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: var(--radius); outline: none; min-width: 0; }
    .task-input:focus { border-color: var(--accent); }
    .task-add { font-family: var(--mono); font-size: 18px; line-height: 1; padding: 4px 10px; border: 1px solid var(--border); background: transparent; color: var(--accent); border-radius: var(--radius); cursor: pointer; flex-shrink: 0; }
    .task-add:hover { background: var(--accent-dim); }
    .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 4px; }
    .task-item input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; margin-top: 3px; }
    .task-item label { font-family: var(--serif); font-size: 13px; color: var(--text); flex: 1; cursor: pointer; line-height: 1.4; }
    .task-item.done label { text-decoration: line-through; color: var(--muted); }
    .task-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 13px; padding: 2px 4px; transition: color 0.15s; flex-shrink: 0; }
    .task-del:hover { color: var(--danger); }
    .task-group-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 10px 0 4px; }
    .clear-done { font-family: var(--mono); font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 6px 0 0; transition: color 0.15s; }
    .clear-done:hover { color: var(--danger); }

    /* Aims & Intentions */
    .aims-wrap { margin-top: 32px; }
    .aims-stack { display: flex; flex-direction: column; gap: 20px; max-width: 600px; }
    .aims-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .aims-header { margin-bottom: 14px; }
    .aims-week-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
    .aims-list { list-style: none; display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .aims-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .aims-item-text { font-family: var(--serif); font-size: 15px; color: var(--text); flex: 1; outline: none; background: transparent; border: none; border-bottom: 1px solid transparent; line-height: 1.5; }
    .aims-item-text:focus { border-bottom-color: var(--accent); }
    .aims-item-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 14px; padding: 2px 4px; transition: color 0.15s; flex-shrink: 0; }
    .aims-item-del:hover { color: var(--danger); }
    .aims-input { width: 100%; font-family: var(--serif); font-size: 15px; padding: 6px 0; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); outline: none; transition: border-color 0.15s; }
    .aims-input:focus { border-bottom-color: var(--accent); }
    .aims-input::placeholder { color: var(--muted); font-style: italic; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 420px; max-width: 90vw; transform: translateY(8px); transition: transform 0.2s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-date { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .modal-input { width: 100%; font-family: var(--serif); font-size: 15px; padding: 10px 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: var(--radius); outline: none; margin-bottom: 16px; transition: border-color 0.15s; }
    .modal-input:focus { border-color: var(--accent); }
    .modal-existing { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
    .modal-note-item { display: flex; align-items: center; gap: 8px; font-family: var(--serif); font-size: 14px; color: var(--text); padding: 6px 10px; background: var(--surface); border-radius: var(--radius); }
    .modal-note-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; margin-left: auto; transition: color 0.15s; }
    .modal-note-del:hover { color: var(--danger); }
    .modal-footer { display: flex; justify-content: flex-end; }

    /* Ideas */
    .idea-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
    .idea-text { font-family: var(--serif); font-size: 15px; color: var(--text); line-height: 1.6; margin-bottom: 10px; background: var(--accent-dim); padding: 10px 14px; border-radius: var(--radius); }
    .idea-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .idea-comment { width: 100%; font-family: var(--serif); font-size: 14px; padding: 8px 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: var(--radius); outline: none; transition: border-color 0.15s; margin-bottom: 8px; }
    .idea-comment:focus { border-color: var(--accent); }
    .idea-comment::placeholder { color: var(--muted); font-style: italic; }
    .idea-footer { display: flex; justify-content: flex-end; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 16px; margin-bottom: 40px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-value { font-family: var(--mono); font-size: 32px; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 6px; }
    .stat-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .log-table td { font-family: var(--mono); font-size: 13px; color: var(--text); padding: 10px 0; border-bottom: 1px solid var(--border); }
    .log-table td.muted { color: var(--muted); }

    .spinner-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 150; transition: opacity 0.3s; }
    .spinner-wrap.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #fff; font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; padding: 10px 24px; border-radius: 20px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 300; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--mono); font-size: 13px; }

    @media (max-width: 860px) { .cal-grid-wrap { flex-direction: column; } .tasks-panel { width: 100%; max-height: none; } }
    @media (max-width: 640px) { .project-row,.project-headers { grid-template-columns: 1fr auto; } .project-field { display: none; } }
  </style>
</head>
<body data-theme="light">
<div class="spinner-wrap" id="spinner"><div class="spinner"></div></div>
<div class="loading-bar" id="loading-bar"></div>
<div class="app">
  <div class="topbar">
    <span class="wordmark">Studio</span>
    <div class="nav">
      <button class="nav-btn active" onclick="showView('journal',this)">Write</button>
      <button class="nav-btn" onclick="showView('projects',this)">Projects</button>
      <button class="nav-btn" onclick="showView('calendar',this)">Calendar</button>
      <button class="nav-btn" onclick="showView('ideas',this)">Ideas</button>
      <button class="nav-btn" onclick="showView('stats',this)">Log</button>
      <button class="theme-toggle" onclick="toggleTheme()">◐</button>
    </div>
  </div>

  <!-- Write -->
  <div id="view-journal" class="view active">
    <div class="write-top">
      <span class="date-label" id="today-date"></span>
      <button class="btn-sm" id="yesterday-toggle" onclick="toggleYesterday()" style="margin-left:12px;">Yesterday →</button>
      <div class="timer-inline">
        <div class="timer-display" id="timer-display">20:00</div>
        <div class="timer-controls">
          <button class="btn-sm" id="play-btn" onclick="toggleTimer()">Play</button>
          <button class="btn-sm btn-ghost" onclick="resetTimer()">Reset</button>
          <select class="duration-select" onchange="setDuration(this.value)">
            <option value="15">15 min</option>
            <option value="20" selected>20 min</option>
            <option value="25">25 min</option>
            <option value="30">30 min</option>
            <option value="45">45 min</option>
            <option value="60">60 min</option>
          </select>
        </div>
      </div>
    </div>
    <div class="writing-area" id="writing-area" contenteditable="true" data-placeholder="Begin when you're ready." oninput="updateWordCount()" onkeydown="checkHighlightKey(event)"></div>
    <div class="writing-area" id="yesterday-area" contenteditable="false" style="display:none;" onkeydown="checkYesterdayHighlightKey(event)" tabindex="0"></div>
    <div class="writing-footer">
      <span class="word-count" id="word-count">0 words</span>
      <span class="word-count" id="highlight-count" style="margin-left:16px;">0 highlights</span>
      <span class="word-count" id="yesterday-highlight-count" style="margin-left:16px;display:none;">0 highlights</span>
      <button class="btn btn-primary" id="save-entry-btn" onclick="saveEntry()" style="margin-left:auto;">Save entry</button>
    </div>
  </div>

  <!-- Projects -->
  <div id="view-projects" class="view">
    <div class="section-header">
      <span class="section-title">Projects</span>
      <button class="btn btn-primary" onclick="addProject()">+ Add</button>
    </div>
    <div class="project-headers">
      <span></span>
      <span class="col-label">Title</span>
      <span class="col-label">Deadline</span>
      <span class="col-label"></span>
    </div>
    <div id="project-list"></div>
  </div>

  <!-- Calendar -->
  <div id="view-calendar" class="view">
    <div class="cal-header">
      <div class="cal-nav">
        <button class="btn-sm" onclick="calNav(-1)">←</button>
        <button class="btn-sm" onclick="calToday()">Today</button>
        <button class="btn-sm" onclick="calNav(1)">→</button>
      </div>
      <span class="cal-title" id="cal-title"></span>
      <div class="cal-view-toggle">
        <button class="cal-view-btn active" id="btn-week" onclick="setCalView('week')">Week</button>
        <button class="cal-view-btn" id="btn-month" onclick="setCalView('month')">Month</button>
      </div>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-main" id="cal-main"></div>
      <div class="tasks-panel">
        <div class="tasks-title">Tasks</div>
        <div class="task-input-row">
          <input class="task-input" id="task-input" type="text" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()" />
          <button class="task-add" onclick="addTask()">+</button>
        </div>
        <div id="tasks-active"></div>
        <div id="tasks-done-wrap" style="display:none">
          <div class="task-group-label">Done</div>

          <button class="clear-done" onclick="clearDone()">Clear done</button>
        </div>
      </div>

    <!-- Aims & Intentions -->
    <div class="aims-wrap">
      <div class="aims-stack">
        <div class="aims-panel">
          <div class="aims-header">
            <div class="section-title">This week's aims and intentions</div>
            <div class="aims-week-sub" id="aims-week-label"></div>
          </div>
          <ul class="aims-list" id="aims-week-list"></ul>
          <input class="aims-input" id="aims-week-input" type="text" placeholder="Add aim or intention..." onkeydown="if(event.key==='Enter')addAim('week')" />
        </div>
        <div class="aims-panel">
          <div class="aims-header">
            <div class="section-title">The Big Picture</div>
          </div>
          <ul class="aims-list" id="aims-general-list"></ul>
          <input class="aims-input" id="aims-general-input" type="text" placeholder="Add aim or intention..." onkeydown="if(event.key==='Enter')addAim('general')" />
        </div>
      </div>
    </div>
  </div>

  <!-- Ideas -->
  <div id="view-ideas" class="view">
    <div class="section-header">
      <span class="section-title">Ideas</span>
      <button class="btn btn-primary" onclick="exportIdeasPDF()">Export this month</button>
    </div>
    <div id="ideas-list"></div>
  </div>

  <!-- Log -->
  <div id="view-stats" class="view">
    <div class="section-header">
      <span class="section-title">Writing log</span>
      <button class="btn btn-primary" onclick="exportMonthlyPDF()">Export this month</button>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <table class="log-table">
      <thead><tr><th>Date</th><th>Words</th><th>Time</th><th>Type</th></tr></thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-existing" id="modal-existing"></div>
    <input class="modal-input" id="modal-input" type="text" placeholder="Add a note or delmål..." onkeydown="if(event.key==='Enter')saveNote()" />
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalDirect()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var API = 'https://script.google.com/macros/s/AKfycbzr5OYCAR90h6bz21Goydu1bz7ISkKHWHAlO_ogk1RXRU1dkbLdCRyU_BeovbdhNi0/exec';
  var state = { projects:[], log:[], tasks:[], notes:{}, aims:{week:[],general:[],weekKey:''}, ideas:[], logTotals:{totalWords:0,totalMins:0,totalSessions:0} };
  var timerInterval=null, timerRunning=false, timerDuration=20*60, timerRemaining=20*60, sessionStartTime=null;
  var calView='week', calCursor=new Date(), modalDateKey=null;

  // ── API ──
  function loadingBar(on){ var b=document.getElementById('loading-bar'); b.className=on?'loading-bar active':'loading-bar done'; if(!on)setTimeout(function(){b.className='loading-bar';},600); }

  function apiLoad(cb){
    loadingBar(true);
    fetch(API+'?action=load')
      .then(function(r){return r.json();})
      .then(function(d){
        state.projects = d.projects||[];
        state.tasks    = d.tasks||[];
        state.log      = d.log||[];
        state.notes    = d.notes||{};
        state.aims     = d.aims||{week:[],general:[],weekKey:''};
        state.ideas    = d.ideas||[];
        state.logTotals = d.logTotals||{totalWords:0,totalMins:0,totalSessions:0};
        loadingBar(false);
        document.getElementById('spinner').classList.add('hidden');
        if(cb)cb();
      })
      .catch(function(e){ loadingBar(false); document.getElementById('spinner').classList.add('hidden'); showToast('Could not reach Sheet'); console.error(e); });
  }

  function apiPost(body,cb){
    loadingBar(true);
    fetch(API,{ method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(body) })
      .then(function(r){return r.json();})
      .then(function(d){ loadingBar(false); if(cb)cb(d); })
      .catch(function(e){ loadingBar(false); showToast('Save failed'); console.error(e); });
  }

  function saveProjects(){ apiPost({action:'saveProjects',rows:state.projects}); }
  function saveTasks(){ apiPost({action:'saveTasks',rows:state.tasks}); }
  function saveNotes(){
    var rows=[];
    Object.keys(state.notes).forEach(function(k){ state.notes[k].forEach(function(v){ rows.push({dateKey:k,text:v}); }); });
    apiPost({action:'saveNotes',rows:rows});
  }
  function saveAims(){ apiPost({action:'saveAims',data:state.aims}); }
  function saveIdeas(){ apiPost({action:'saveIdeas',rows:state.ideas}); }

  // ── Theme ──
  function toggleTheme(){ document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark'; localStorage.setItem('studio_theme',document.body.dataset.theme); }

  // ── Views ──
  function showView(name,btn){
    document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
    document.getElementById('view-'+name).classList.add('active');
    if(btn)btn.classList.add('active');
    if(name==='projects')renderProjects();
    if(name==='calendar'){renderCalendar();renderTasks();renderAims();}
    if(name==='ideas')renderIdeas();
    if(name==='stats')renderStats();
  }

  // ── Timer ──
  function pad(n){return String(n).padStart(2,'0');}
  function displayTimer(s){document.getElementById('timer-display').textContent=pad(Math.floor(s/60))+':'+pad(s%60);}
  function setDuration(m){timerDuration=parseInt(m)*60;timerRemaining=timerDuration;displayTimer(timerRemaining);if(timerRunning)stopTimer();document.getElementById('timer-display').className='timer-display';}
  function toggleTimer(){timerRunning?stopTimer():startTimer();}
  function startTimer(){
    if(timerRemaining<=0)timerRemaining=timerDuration;
    timerRunning=true;sessionStartTime=sessionStartTime||Date.now();
    document.getElementById('play-btn').textContent='Pause';
    document.getElementById('play-btn').classList.add('active-play');
    document.getElementById('timer-display').classList.add('running');
    timerInterval=setInterval(function(){
      timerRemaining--;displayTimer(timerRemaining);
      if(timerRemaining<=0){
        clearInterval(timerInterval);timerRunning=false;
        document.getElementById('play-btn').textContent='Play';
        document.getElementById('play-btn').classList.remove('active-play');
        document.getElementById('timer-display').className='timer-display done';
        document.getElementById('writing-area').classList.add('time-up');
        showToast('Time is up');
      }
    },1000);
  }
  function stopTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('play-btn').textContent='Play';document.getElementById('play-btn').classList.remove('active-play');document.getElementById('timer-display').classList.remove('running');}
  function resetTimer(){stopTimer();timerRemaining=timerDuration;sessionStartTime=null;displayTimer(timerRemaining);document.getElementById('timer-display').className='timer-display';document.getElementById('writing-area').classList.remove('time-up');}

  // ── Write ──
  function getPlainText(){ return document.getElementById('writing-area').innerText || ''; }
  function countWords(t){return t.trim()?t.trim().split(/\s+/).length:0;}
  function updateWordCount(){
    var n=countWords(getPlainText());
    document.getElementById('word-count').textContent=n+(n===1?' word':' words');
  }

  var sessionHighlights = [];

  // ── Yesterday review ──
  var showingYesterday = false;
  var yesterdayHighlights = [];

  function toggleYesterday(){
    showingYesterday = !showingYesterday;
    var writeArea = document.getElementById('writing-area');
    var yArea = document.getElementById('yesterday-area');
    var btn = document.getElementById('yesterday-toggle');
    var wCount = document.getElementById('word-count');
    var hCount = document.getElementById('highlight-count');
    var yCount = document.getElementById('yesterday-highlight-count');
    var saveBtn = document.getElementById('save-entry-btn');

    if(showingYesterday){
      writeArea.style.display='none';
      yArea.style.display='block';
      btn.textContent='← Today';
      wCount.style.display='none';
      hCount.style.display='none';
      yCount.style.display='inline';
      saveBtn.style.display='none';
      loadYesterday();
    } else {
      writeArea.style.display='block';
      yArea.style.display='none';
      btn.textContent='Yesterday →';
      wCount.style.display='inline';
      hCount.style.display='inline';
      yCount.style.display='none';
      saveBtn.style.display='inline-block';
    }
  }

  function loadYesterday(){
    var yArea = document.getElementById('yesterday-area');
    var yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    var yKey = yesterday.toDateString();
    var entry = state.log.filter(function(e){ return e.type==='journal'; })
      .find(function(e){ return new Date(e.date).toDateString()===yKey; });
    yesterdayHighlights = [];
    document.getElementById('yesterday-highlight-count').textContent='0 highlights';

    if(entry){
      yArea.textContent = entry.text;
      return;
    }

    // Yesterday might be in a previous month not loaded locally — fetch it
    yArea.innerHTML='<span style="color:var(--muted);font-style:italic;">Loading…</span>';
    var y=yesterday.getFullYear(), m=yesterday.getMonth();
    fetch(API+'?action=loadMonth&year='+y+'&month='+m)
      .then(function(r){return r.json();})
      .then(function(rows){
        var found=(rows||[]).filter(function(e){return e.type==='journal';})
          .find(function(e){return new Date(e.date).toDateString()===yKey;});
        if(found){ yArea.textContent = found.text; }
        else { yArea.innerHTML='<span style="color:var(--muted);font-style:italic;">No entry from yesterday.</span>'; }
      })
      .catch(function(){ yArea.innerHTML='<span style="color:var(--muted);font-style:italic;">Could not load yesterday\u2019s entry.</span>'; });
  }

  function checkYesterdayHighlightKey(e){
    if(e.key!=='q' && e.key!=='Q') return;
    var sel = window.getSelection();
    if(!sel || sel.isCollapsed || sel.rangeCount===0) return;
    var range = sel.getRangeAt(0);
    var area = document.getElementById('yesterday-area');
    if(!area.contains(range.commonAncestorContainer)) return;
    e.preventDefault();
    var text = sel.toString().trim();
    if(!text) return;
    try {
      var mark = document.createElement('mark');
      var contents = range.extractContents();
      mark.appendChild(contents);
      range.insertNode(mark);
      sel.removeAllRanges();

      yesterdayHighlights.push(text);
      document.getElementById('yesterday-highlight-count').textContent = yesterdayHighlights.length + (yesterdayHighlights.length===1?' highlight':' highlights');

      // Save immediately to Ideas (read-only view, no batch save step)
      var now = new Date();
      state.ideas.push({date:now.toISOString(), text:text, comment:''});
      saveIdeas();
      showToast('Highlight saved');
    } catch(err) {
      console.error(err);
      showToast('Could not highlight that selection');
    }
  }

  function checkHighlightKey(e){
    if(e.key!=='q' && e.key!=='Q') return;
    var sel = window.getSelection();
    if(!sel || sel.isCollapsed || sel.rangeCount===0) return;
    var range = sel.getRangeAt(0);
    var writingArea = document.getElementById('writing-area');
    if(!writingArea.contains(range.commonAncestorContainer)) return;
    e.preventDefault();
    var text = sel.toString().trim();
    if(!text) return;

    try {
      var mark = document.createElement('mark');
      var contents = range.extractContents();
      mark.appendChild(contents);
      range.insertNode(mark);

      // Place cursor right after the mark with a safe text node to land on
      var spacer = document.createTextNode('\u200B');
      if (mark.nextSibling) {
        mark.parentNode.insertBefore(spacer, mark.nextSibling);
      } else {
        mark.parentNode.appendChild(spacer);
      }
      var newRange = document.createRange();
      newRange.setStart(spacer, 1);
      newRange.collapse(true);
      sel.removeAllRanges();
      sel.addRange(newRange);

      sessionHighlights.push(text);
      updateHighlightCount();
    } catch(err) {
      console.error(err);
      showToast('Could not highlight that selection');
    }
  }

  function updateHighlightCount(){
    var n = sessionHighlights.length;
    document.getElementById('highlight-count').textContent = n + (n===1?' highlight':' highlights');
  }

  function saveEntry(){
    var area = document.getElementById('writing-area');
    var text = getPlainText().trim();
    if(!text){ showToast('Nothing to save yet'); return; }
    var words=countWords(text), now=new Date();
    var elapsed=sessionStartTime?Math.round((Date.now()-sessionStartTime)/60000):null;
    var entry={date:now.toISOString(),words:words,minutes:elapsed,type:'journal',text:text};
    state.log.push(entry);
    apiPost({action:'appendLog',entry:entry});

    // Save highlights as ideas
    if(sessionHighlights.length){
      sessionHighlights.forEach(function(h){
        state.ideas.push({date:now.toISOString(), text:h, comment:''});
      });
      saveIdeas();
    }

    var blob=new Blob([text],{type:'text/plain'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='journal-'+now.toISOString().slice(0,10)+'.txt';a.click();

    area.innerHTML='';
    sessionHighlights=[];
    updateHighlightCount();
    updateWordCount();resetTimer();
    showToast('Saved '+words+' words'+(state.ideas.length?'':''));
  }

  // ── Deadline helpers ──
  function parseDeadline(str){
    if(!str)return null;
    str=String(str).trim();
    if(str.length>10&&str.indexOf('T')>-1)str=str.slice(0,10);
    var p=str.split(/[.\-\/]/);var d;
    if(p.length===3){if(p[0].length===4)d=new Date(+p[0],+p[1]-1,+p[2]);else d=new Date(+p[2],+p[1]-1,+p[0]);}
    else{d=new Date(str);}
    return isNaN(d)?null:d;
  }
  function deadlineStatus(str){
    var d=parseDeadline(str);if(!d)return null;
    var now=new Date();now.setHours(0,0,0,0);d.setHours(0,0,0,0);
    var diff=Math.round((d-now)/86400000);
    if(diff<0)return'overdue';if(diff<=7)return'warn';return null;
  }
  function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}

  // ── Drag and drop ──
  var dragSrcIndex = null;
  function dragStart(e){
    dragSrcIndex = parseInt(e.currentTarget.dataset.index);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function dragOver(e){
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }
  function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
  function dragDrop(e){
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    var targetIndex = parseInt(e.currentTarget.dataset.index);
    if(dragSrcIndex === null || dragSrcIndex === targetIndex) return;
    var moved = state.projects.splice(dragSrcIndex, 1)[0];
    state.projects.splice(targetIndex, 0, moved);
    dragSrcIndex = null;
    saveProjects();
    renderProjects();
  }

  // ── Projects ──
  function renderProjects(){
    var el=document.getElementById('project-list');
    if(!state.projects.length){el.innerHTML='<div class="empty">No projects yet.</div>';return;}
    el.innerHTML=state.projects.map(function(p,i){
      var st=deadlineStatus(p.deadline);
      var badge=st?'<span class="deadline-badge '+st+'">'+(st==='overdue'?'overdue':'due')+'</span>':'';
      var driveBtn=p.driveUrl
        ?'<a class="link-btn" href="'+esc(p.driveUrl)+'" target="_blank">Link ↗</a><button class="link-btn" onclick="setDriveLink('+i+')">✎</button>'
        :'<button class="link-btn" onclick="setDriveLink('+i+')">+ Link</button>';
      return'<div class="project-row'+(st?' '+st:'')+'" draggable="true" data-index="'+i+'" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dragDrop(event)">'
        +'<span class="drag-handle" title="Drag to reorder">⠿</span>'
        +'<div style="display:flex;align-items:center;gap:6px;min-width:0;">'
        +'<input class="project-title" value="'+esc(p.title)+'" placeholder="Project title" onchange="state.projects['+i+'].title=this.value;saveProjects();"/>'
        +badge+'</div>'
        +'<input class="project-field" value="'+esc(p.deadline)+'" placeholder="dd.mm.yyyy" onblur="state.projects['+i+'].deadline=this.value;saveProjects();renderProjects();"/>'
        +'<div class="project-actions">'+driveBtn
        +'<button class="link-btn" onclick="addPlanItem('+i+')">+ Plan</button>'
        +'<button class="delete-btn" onclick="deleteProject('+i+')">×</button></div>'
        +'</div>'
        +'<div class="plan-items" id="plan-items-'+i+'"></div>';
    }).join('');
    state.projects.forEach(function(p,i){ renderPlanItemsEl(i); });
  }

  function renderPlanItemsEl(i){
    var el=document.getElementById('plan-items-'+i);
    if(!el)return;
    var plans=state.projects[i].plans||[];
    if(!plans.length){el.innerHTML='';return;}
    el.innerHTML=plans.map(function(plan,j){
      var st=deadlineStatus(plan.deadline);
      var badge=st?'<span class="deadline-badge '+st+'">'+(st==='overdue'?'overdue':'due')+'</span>':'';
      var rv=plan.repeatEvery||'', ru=plan.repeatUnit||'weeks';
      var deferBtn=plan.deadline&&plan.repeatEvery?'<button class="link-btn" onclick="deferPlanItem('+i+','+j+')" style="font-size:10px;">Defer</button>':'';
      var driveBtn=plan.driveUrl
        ?'<a class="link-btn" href="'+esc(plan.driveUrl)+'" target="_blank" style="font-size:10px;">Link ↗</a><button class="link-btn" style="font-size:10px;" onclick="setPlanDrive('+i+','+j+')">✎</button>'
        :'<button class="link-btn" style="font-size:10px;" onclick="setPlanDrive('+i+','+j+')">+ Link</button>';
      return'<div class="plan-item">'
        +'<input class="plan-item-text" value="'+esc(plan.title)+'" placeholder="Planning note..." onchange="state.projects['+i+'].plans['+j+'].title=this.value;saveProjects();"/>'
        +'<input class="project-field" style="width:80px;" value="'+esc(plan.deadline)+'" placeholder="dd.mm.yyyy" onblur="state.projects['+i+'].plans['+j+'].deadline=this.value;saveProjects();renderProjects();"/>'
        +badge
        +'<div style="display:flex;gap:4px;align-items:center;">'
        +'<input class="project-field" style="width:28px;text-align:center;" value="'+esc(rv)+'" placeholder="—" onchange="state.projects['+i+'].plans['+j+'].repeatEvery=this.value;saveProjects();renderProjects();"/>'
        +'<select class="duration-select" style="padding:2px 4px;font-size:10px;" onchange="state.projects['+i+'].plans['+j+'].repeatUnit=this.value;saveProjects();">'
        +'<option value="weeks"'+(ru==='weeks'?' selected':'')+'>wk</option>'
        +'<option value="months"'+(ru==='months'?' selected':'')+'>mo</option>'
        +'</select></div>'
        +deferBtn+driveBtn
        +'<button class="delete-btn" onclick="deletePlanItem('+i+','+j+')">×</button>'
        +'</div>';
    }).join('');
  }

  function deferPlanItem(i,j){
    var plan=state.projects[i].plans[j], d=parseDeadline(plan.deadline); if(!d)return;
    var n=parseInt(plan.repeatEvery)||1;
    if(plan.repeatUnit==='months')d=new Date(d.getFullYear(),d.getMonth()+n,d.getDate());
    else d=new Date(d.getTime()+n*7*86400000);
    var nd=pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
    state.projects[i].plans[j].deadline=nd; saveProjects(); renderProjects();
    showToast('Deferred to '+nd);
  }

  function addPlanItem(i){
    if(!state.projects[i].plans)state.projects[i].plans=[];
    state.projects[i].plans.push({title:'',deadline:'',repeatEvery:'',repeatUnit:'weeks',driveUrl:''});
    saveProjects();renderProjects();
    setTimeout(function(){
      var el=document.getElementById('plan-items-'+i);
      if(el){var inputs=el.querySelectorAll('.plan-item-text');if(inputs.length)inputs[inputs.length-1].focus();}
    },50);
  }
  function deletePlanItem(i,j){state.projects[i].plans.splice(j,1);saveProjects();renderProjects();}
  function setPlanDrive(i,j){var cur=state.projects[i].plans[j].driveUrl||'';var url=prompt('Link URL (Dropbox, Scrivener, etc):',cur);if(url===null)return;state.projects[i].plans[j].driveUrl=url;saveProjects();renderProjects();}

  function addProject(){
    state.projects.push({title:'',deadline:'',driveUrl:'',plans:[]});
    saveProjects();renderProjects();
    setTimeout(function(){var rows=document.querySelectorAll('.project-row');if(rows.length)rows[rows.length-1].querySelector('.project-title').focus();},50);
  }
  function deleteProject(i){if(!confirm('Remove this project?'))return;state.projects.splice(i,1);saveProjects();renderProjects();}
  function setDriveLink(i){var cur=state.projects[i].driveUrl||'';var url=prompt('Link URL (Dropbox, Scrivener, etc):',cur);if(url===null)return;state.projects[i].driveUrl=url;saveProjects();renderProjects();}
  function deferProject(i){
    var p=state.projects[i],d=parseDeadline(p.deadline);if(!d)return;
    var n=parseInt(p.repeatEvery)||1;
    if(p.repeatUnit==='months')d=new Date(d.getFullYear(),d.getMonth()+n,d.getDate());
    else d=new Date(d.getTime()+n*7*86400000);
    var nd=pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
    state.projects[i].deadline=nd;saveProjects();renderProjects();showToast('Deferred to '+nd);
  }

  // ── Calendar ──
  function setCalView(v){calView=v;document.getElementById('btn-week').classList.toggle('active',v==='week');document.getElementById('btn-month').classList.toggle('active',v==='month');renderCalendar();}
  function calNav(dir){if(calView==='week')calCursor=new Date(calCursor.getTime()+dir*7*86400000);else calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth()+dir,1);renderCalendar();}
  function calToday(){calCursor=new Date();renderCalendar();}

  function getDeadlineEvents(){
    var evts={};
    state.projects.forEach(function(p){
      if(!p.deadline||!p.title)return;
      var d=parseDeadline(p.deadline);if(!d)return;
      var k=dateKey(d);if(!evts[k])evts[k]=[];
      evts[k].push({label:p.title,status:deadlineStatus(p.deadline)});
    });
    return evts;
  }

  function renderCalendar(){
    var today=new Date();today.setHours(0,0,0,0);
    var deadlines=getDeadlineEvents(),notes=state.notes||{};
    var el=document.getElementById('cal-main');
    function evHtml(k){
      var h='';
      if(deadlines[k])deadlines[k].forEach(function(e){h+='<div class="cal-event deadline'+(e.status?' '+e.status:'')+'" title="'+esc(e.label)+'">'+esc(e.label)+'</div>';});
      if(notes[k])notes[k].forEach(function(n){h+='<div class="cal-event note" title="'+esc(n)+'">'+esc(n)+'</div>';});
      return h;
    }
    if(calView==='month'){
      var y=calCursor.getFullYear(),m=calCursor.getMonth();
      document.getElementById('cal-title').textContent=new Date(y,m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
      var startDow=(new Date(y,m,1).getDay()+6)%7,dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
      var h='<div class="cal-weekdays">';
      ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(function(d){h+='<div class="cal-weekday">'+d+'</div>';});
      h+='</div><div class="cal-days">';
      for(var i=startDow-1;i>=0;i--)h+='<div class="cal-day other-month"><span class="cal-day-num">'+(prev-i)+'</span></div>';
      for(var d=1;d<=dim;d++){
        var dt=new Date(y,m,d);dt.setHours(0,0,0,0);var k=dateKey(dt),isT=dt.getTime()===today.getTime();
        h+='<div class="cal-day'+(isT?' today':'')+'" onclick="openModal(\''+k+'\')">'+'<span class="cal-day-num">'+d+'</span>'+evHtml(k)+'</div>';
      }
      var rem=(7-(startDow+dim)%7)%7;
      for(var x=1;x<=rem;x++)h+='<div class="cal-day other-month"><span class="cal-day-num">'+x+'</span></div>';
      el.innerHTML=h+'</div>';
    } else {
      var dow=(calCursor.getDay()+6)%7,ws=new Date(calCursor.getTime()-dow*86400000);ws.setHours(0,0,0,0);
      var days=[];for(var i=0;i<7;i++)days.push(new Date(ws.getTime()+i*86400000));
      document.getElementById('cal-title').textContent=days[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+days[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      var h='<div class="cal-week-header">';
      days.forEach(function(d){var isT=d.getTime()===today.getTime();h+='<div class="cal-week-col-head'+(isT?' today-col':'')+'" onclick="openModal(\''+dateKey(d)+'\')">'+d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric'})+'</div>';});
      h+='</div><div class="cal-week-cells">';
      days.forEach(function(d){var k=dateKey(d),isT=d.getTime()===today.getTime();h+='<div class="cal-week-cell'+(isT?' today-col':'')+'" onclick="openModal(\''+k+'\')">'+evHtml(k)+'</div>';});
      el.innerHTML=h+'</div>';
    }
  }

  // ── Modal ──
  function openModal(k){
    modalDateKey=k;var p=k.split('-');
    var d=new Date(+p[0],+p[1]-1,+p[2]);
    document.getElementById('modal-date').textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    renderModalNotes();document.getElementById('modal-input').value='';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(function(){document.getElementById('modal-input').focus();},100);
  }
  function renderModalNotes(){
    var notes=(state.notes&&state.notes[modalDateKey])||[];
    document.getElementById('modal-existing').innerHTML=notes.map(function(n,i){
      return'<div class="modal-note-item">'+esc(n)+'<button class="modal-note-del" onclick="deleteNote('+i+')">×</button></div>';
    }).join('');
  }
  function saveNote(){
    try{
      var text=document.getElementById('modal-input').value.trim();if(!text)return;
      if(!state.notes)state.notes={};if(!state.notes[modalDateKey])state.notes[modalDateKey]=[];
      state.notes[modalDateKey].push(text);
      document.getElementById('modal-input').value='';
      renderModalNotes();saveNotes();renderCalendar();
      showToast('Note saved');
    }catch(e){showToast('Error: '+e.message);console.error(e);}
  }
  function deleteNote(i){state.notes[modalDateKey].splice(i,1);if(!state.notes[modalDateKey].length)delete state.notes[modalDateKey];saveNotes();renderModalNotes();renderCalendar();}
  function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
  function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');}

  // ── Tasks ──
  function addTask(){var input=document.getElementById('task-input');var text=input.value.trim();if(!text)return;state.tasks.push({text:text,done:false});saveTasks();input.value='';renderTasks();}
  function toggleTask(i){state.tasks[i].done=!state.tasks[i].done;saveTasks();renderTasks();}
  function deleteTask(i){state.tasks.splice(i,1);saveTasks();renderTasks();}
  function clearDone(){state.tasks=state.tasks.filter(function(t){return!t.done;});saveTasks();renderTasks();}
  function renderTasks(){
    var tasks=state.tasks||[];
    document.getElementById('tasks-active').innerHTML=tasks.map(function(t,i){if(t.done)return'';return'<div class="task-item"><input type="checkbox" id="tsk-'+i+'" onchange="toggleTask('+i+')"/><label for="tsk-'+i+'">'+esc(t.text)+'</label><button class="task-del" onclick="deleteTask('+i+')">×</button></div>';}).join('')||'<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:4px;">All clear</div>';
    var doneHtml=tasks.map(function(t,i){if(!t.done)return'';return'<div class="task-item done"><input type="checkbox" id="tskd-'+i+'" checked onchange="toggleTask('+i+')"/><label for="tskd-'+i+'">'+esc(t.text)+'</label><button class="task-del" onclick="deleteTask('+i+')">×</button></div>';}).join('');
    var hasDone=tasks.some(function(t){return t.done;});
    document.getElementById('tasks-done-wrap').style.display=hasDone?'':'none';
    document.getElementById('tasks-done').innerHTML=doneHtml;
  }

  // ── Aims & Intentions ──
  function getWeekKey(){var now=new Date(),dow=(now.getDay()+6)%7,mon=new Date(now.getTime()-dow*86400000);return dateKey(mon);}
  function renderAims(){
    if(!state.aims)state.aims={week:[],general:[],weekKey:''};
    var wk=getWeekKey();
    if(state.aims.weekKey!==wk){state.aims.weekKey=wk;state.aims.week=[];saveAims();}
    var now=new Date();
    document.getElementById('aims-week-label').textContent='Week of '+now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    renderAimsList('week');renderAimsList('general');
  }
  function renderAimsList(type){
    var items=state.aims[type]||[];
    document.getElementById('aims-'+type+'-list').innerHTML=items.map(function(item,i){
      return'<li class="aims-item"><input class="aims-item-text" value="'+esc(item)+'" onchange="state.aims[\''+type+'\']['+i+']=this.value;saveAims();"/><button class="aims-item-del" onclick="deleteAim(\''+type+'\','+i+')">×</button></li>';
    }).join('');
  }
  function addAim(type){var input=document.getElementById('aims-'+type+'-input');var text=input.value.trim();if(!text)return;if(!state.aims[type])state.aims[type]=[];state.aims[type].push(text);saveAims();input.value='';renderAimsList(type);}
  function deleteAim(type,i){state.aims[type].splice(i,1);saveAims();renderAimsList(type);}

  // ── Stats ──
  function renderStats(){
    var log=state.log; // already current-month only from the API
    var totals=state.logTotals||{totalWords:0,totalMins:0,totalSessions:0};
    var monthWords=log.reduce(function(s,e){return s+(parseInt(e.words)||0);},0);
    document.getElementById('stats-grid').innerHTML=
      '<div class="stat-card"><div class="stat-value">'+monthWords.toLocaleString()+'</div><div class="stat-label">Words this month</div></div>'
      +'<div class="stat-card"><div class="stat-value">'+totals.totalWords.toLocaleString()+'</div><div class="stat-label">Words total</div></div>'
      +'<div class="stat-card"><div class="stat-value">'+totals.totalSessions+'</div><div class="stat-label">Sessions total</div></div>'
      +'<div class="stat-card"><div class="stat-value">'+totals.totalMins+'</div><div class="stat-label">Minutes total</div></div>';
    if(!log.length){document.getElementById('log-body').innerHTML='<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:13px;">No entries this month yet.</td></tr>';return;}
    var sorted=log.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    document.getElementById('log-body').innerHTML=sorted.map(function(e){return'<tr><td>'+new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+'</td><td>'+(e.words||0)+'</td><td class="muted">'+(e.minutes?e.minutes+' min':'-')+'</td><td class="muted">'+e.type+'</td></tr>';}).join('');
  }

  function exportMonthlyPDF(){
    var now=new Date(),monthName=now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    var log=state.log.filter(function(e){var d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    if(!log.length){showToast('No entries this month');return;}
    var sorted=log.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>body{font-family:Georgia,serif;max-width:680px;margin:40px auto;color:#1A1917;line-height:1.7;}h1{font-size:22px;margin-bottom:4px;}p.meta{font-size:13px;color:#7A766E;margin-bottom:40px;}.entry{margin-bottom:40px;border-top:1px solid #D4CFC6;padding-top:20px;}.entry-date{font-family:monospace;font-size:12px;color:#7A766E;margin-bottom:12px;}.entry-text{font-size:16px;white-space:pre-wrap;}</style></head><body><h1>Writing log — '+monthName+'</h1><p class="meta">'+sorted.length+' entries · '+sorted.reduce(function(s,e){return s+(parseInt(e.words)||0);},0).toLocaleString()+' words</p>';
    sorted.forEach(function(e){if(e.type!=='journal'||!e.text)return;html+='<div class="entry"><div class="entry-date">'+new Date(e.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+' · '+(e.words||0)+' words'+(e.minutes?' · '+e.minutes+' min':'')+'</div><div class="entry-text">'+esc(e.text)+'</div></div>';});
    html+='</body></html>';
    var blob=new Blob([html],{type:'text/html'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='journal-'+now.getFullYear()+'-'+pad(now.getMonth()+1)+'.html';a.click();
    showToast('Downloaded — open in browser and print to PDF');
  }

  // ── Ideas ──
  function renderIdeas(){
    var el=document.getElementById('ideas-list');
    if(!state.ideas.length){el.innerHTML='<div class="empty">No highlights yet — select text while writing and press Q.</div>';return;}
    var sorted=state.ideas.map(function(idea,origIdx){return {idea:idea,origIdx:origIdx};}).sort(function(a,b){return new Date(b.idea.date)-new Date(a.idea.date);});
    el.innerHTML=sorted.map(function(item){
      var idea=item.idea, i=item.origIdx;
      return'<div class="idea-card">'
        +'<div class="idea-meta">'+new Date(idea.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div>'
        +'<div class="idea-text">'+esc(idea.text)+'</div>'
        +'<input class="idea-comment" value="'+esc(idea.comment||'')+'" placeholder="Add a comment..." onchange="state.ideas['+i+'].comment=this.value;saveIdeas();"/>'
        +'<div class="idea-footer"><button class="delete-btn" onclick="deleteIdea('+i+')">×</button></div>'
        +'</div>';
    }).join('');
  }
  function deleteIdea(i){ if(!confirm('Delete this highlight?'))return; state.ideas.splice(i,1); saveIdeas(); renderIdeas(); }

  function exportIdeasPDF(){
    var now=new Date(),monthName=now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    var ideas=state.ideas.filter(function(idea){var d=new Date(idea.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    if(!ideas.length){showToast('No highlights this month');return;}
    var sorted=ideas.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>body{font-family:Georgia,serif;max-width:680px;margin:40px auto;color:#1A1917;line-height:1.7;}h1{font-size:22px;margin-bottom:4px;}p.meta{font-size:13px;color:#7A766E;margin-bottom:40px;}.idea{margin-bottom:32px;border-top:1px solid #D4CFC6;padding-top:18px;}.idea-date{font-family:monospace;font-size:12px;color:#7A766E;margin-bottom:10px;}.idea-text{font-size:16px;background:#EDEAE3;padding:12px 16px;border-radius:4px;margin-bottom:8px;}.idea-comment{font-size:14px;color:#444;font-style:italic;}</style></head><body><h1>Ideas — '+monthName+'</h1><p class="meta">'+sorted.length+' highlights</p>';
    sorted.forEach(function(idea){
      html+='<div class="idea"><div class="idea-date">'+new Date(idea.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+'</div><div class="idea-text">'+esc(idea.text)+'</div>'+(idea.comment?'<div class="idea-comment">'+esc(idea.comment)+'</div>':'')+'</div>';
    });
    html+='</body></html>';
    var blob=new Blob([html],{type:'text/html'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ideas-'+now.getFullYear()+'-'+pad(now.getMonth()+1)+'.html';a.click();
    showToast('Downloaded — open in browser and print to PDF');
  }

  function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2400);}
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // ── Init ──
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  displayTimer(timerRemaining);
  var savedTheme=localStorage.getItem('studio_theme');if(savedTheme)document.body.dataset.theme=savedTheme;
  apiLoad(function(){renderProjects();});
</script>
</body>
</html>
